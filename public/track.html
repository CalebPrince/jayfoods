<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Track Your Order — Jay Foods</title><link rel="stylesheet" href="legal.css"><style>
header{display:flex;align-items:center;justify-content:space-between}header>a:last-child{color:#fff;text-decoration:none;font-weight:700}.wrap{max-width:900px}.lead{margin:5px 0 25px}.lookup{display:grid;grid-template-columns:1.2fr 1fr auto;gap:12px;align-items:end}.field label{display:block;font-size:.84rem;font-weight:750;margin-bottom:5px}.field input{width:100%;padding:12px 13px;border:1px solid #cbdad0;border-radius:9px;font:inherit}.btn{border:0;border-radius:9px;background:var(--green);color:#fff;padding:13px 20px;font-weight:750;cursor:pointer}.error{color:#a62d25;margin:14px 0 0}.result{margin-top:28px;display:none}.meta,.line{display:flex;justify-content:space-between;gap:20px;padding:11px 0;border-bottom:1px solid var(--line)}.meta span:first-child,.line small{color:var(--muted)}.status{display:inline-block;text-transform:capitalize;background:#edf7f0;color:var(--dark);padding:4px 10px;border-radius:999px;font-weight:750}.progress{display:grid;grid-template-columns:repeat(4,1fr);margin:26px 0}.step{text-align:center;color:#91a198;position:relative;font-size:.8rem}.step:before{content:'';display:block;width:18px;height:18px;border-radius:50%;background:#d8e4db;margin:0 auto 7px;position:relative;z-index:1}.step:after{content:'';height:3px;background:#d8e4db;position:absolute;top:8px;left:-50%;right:50%}.step:first-child:after{display:none}.step.done{color:var(--dark);font-weight:700}.step.done:before,.step.done:after{background:var(--green)}@media(max-width:650px){.lookup{grid-template-columns:1fr}.progress{font-size:.7rem}}
</style></head><body><header><a href="index.html"><img src="img/logo-white.png" alt="Jay fooDs"></a><a href="cart.html">Your cart</a></header><main class="wrap"><article class="card"><h1>Track your order</h1><p class="lead">Enter the reference from your confirmation and the phone number used at checkout.</p><form id="track-form" class="lookup"><div class="field"><label for="reference">Order reference</label><input id="reference" name="reference" required placeholder="JF-20260711-ABC123" autocomplete="off"></div><div class="field"><label for="phone">Phone number</label><input id="phone" name="phone" type="tel" required placeholder="024 632 8461" autocomplete="tel"></div><button class="btn" id="submit">Track order</button></form><p class="error" id="error" role="alert"></p><section class="result" id="result" aria-live="polite"></section></article></main><footer><a href="index.html">Home</a><a href="index.html#contact">Contact</a><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a></footer><script src="js/api.js"></script><script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const money=p=>'GH₵ '+(Number(p||0)/100).toFixed(2);const fmt=d=>new Date(String(d).replace(' ','T')+'Z').toLocaleString();const stages=['pending','confirmed','processing','delivered'];document.getElementById('track-form').addEventListener('submit',async e=>{e.preventDefault();const button=document.getElementById('submit'),error=document.getElementById('error'),result=document.getElementById('result');error.textContent='';result.style.display='none';button.disabled=true;button.textContent='Checking…';try{const {data:o}=await api.trackOrder(e.target.reference.value.trim(),e.target.phone.value.trim());const current=o.status==='cancelled'?-1:stages.indexOf(o.status);const progress=o.status==='cancelled'?'<p class="notice">This order has been cancelled. Contact us if you need help.</p>':`<div class="progress">${stages.map((s,i)=>`<div class="step ${i<=current?'done':''}">${s}</div>`).join('')}</div>`;result.innerHTML=`<div class="meta"><span>Reference</span><strong>${esc(o.reference)}</strong></div><div class="meta"><span>Order status</span><span class="status">${esc(o.status)}</span></div><div class="meta"><span>Payment</span><span class="status">${esc(o.payment_status)}</span></div>${progress}<h2>Status updates</h2>${(o.history||[]).map(h=>`<div class="meta"><span><span class="status">${esc(h.status)}</span> ${esc(h.note||"")}</span><span>${fmt(h.created_at)}</span></div>`).join("")}<h2>Items</h2>${o.items.map(i=>`<div class="line"><span>${i.quantity} × ${esc(i.product_name)}</span><strong>${money(i.line_total_pesewas)}</strong></div>`).join('')}<div class="line"><small>Products</small><span>${money(o.subtotal_pesewas)}</span></div><div class="line"><small>Delivery</small><span>${money(o.delivery_fee_pesewas)}</span></div><div class="line"><strong>Total</strong><strong>${money(o.total_pesewas)}</strong></div><div class="meta"><span>Delivery area</span><span>${esc(o.region)}</span></div><div class="meta"><span>Ordered</span><span>${fmt(o.created_at)}</span></div>`;result.style.display='block'}catch(err){error.textContent=err.message}finally{button.disabled=false;button.textContent='Track order'}});const ref=new URLSearchParams(location.search).get('reference');if(ref)document.getElementById('reference').value=ref;
</script></body></html>
