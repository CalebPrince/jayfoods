<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login — Jay fooDs Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="login-form" novalidate>
      <img src="../img/logo-color.png" alt="Jay fooDs" style="height:56px;width:auto;margin-bottom:14px" />
      <h1>Control Center</h1>
      <p class="sub">Sign in to manage products, orders and messages.</p>

      <div class="form-error" id="error" style="display:none"></div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" value="" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="submit">Sign in</button>
      <p class="hint" style="margin-top:16px; color:var(--muted); font-size:.8rem;">
        ← <a href="../index.html">Back to website</a>
      </p>
    </form>
  </div>

  <script>
    (function () {
      const form = document.getElementById('login-form');
      const errBox = document.getElementById('error');
      const btn = document.getElementById('submit');

      // If already signed in, go straight to the dashboard.
      fetch('/api/v1/auth/me', { credentials: 'same-origin' })
        .then((r) => { if (r.ok) location.replace('index.html'); })
        .catch(() => {});

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.style.display = 'none';
        btn.disabled = true; btn.textContent = 'Signing in…';
        try {
          const res = await fetch('/api/v1/auth/login', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: document.getElementById('email').value.trim(),
              password: document.getElementById('password').value,
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || 'Login failed.');
          location.replace('index.html');
        } catch (err) {
          errBox.textContent = err.message;
          errBox.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Sign in';
        }
      });
    })();
  </script>
</body>
</html>
