<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Your Cart — Jay Foods</title><style>
:root{--g:#1f7a3d;--gd:#155c2d;--bg:#f6faf7;--line:#dce7df;--muted:#68776e;--danger:#b83228}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#10241a}header{background:var(--g);padding:15px 20px;display:flex;justify-content:space-between;align-items:center}header img{height:42px}header a{color:#fff;text-decoration:none}.wrap{max-width:1050px;margin:auto;padding:35px 20px 70px}h1{color:var(--gd)}.layout{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start}.panel{background:#fff;border:1px solid var(--line);border-radius:15px;padding:20px}.item{display:grid;grid-template-columns:70px 1fr auto;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);align-items:center}.item img{width:70px;height:70px;object-fit:cover;border-radius:10px}.item h3{margin:0 0 4px}.meta{color:var(--muted);font-size:.86rem}.qty{display:flex;align-items:center;gap:7px}.qty button,.remove{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 10px;cursor:pointer}.remove{color:var(--danger);margin-top:7px}.total{display:flex;justify-content:space-between;font-size:1.2rem;font-weight:800;margin:18px 0}.field{margin-bottom:12px}.field label{display:block;font-size:.82rem;font-weight:700;margin-bottom:4px}.field input,.field textarea,.field select{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font:inherit}.checkout,.continue{width:100%;padding:14px;border:0;border-radius:10px;background:var(--g);color:#fff;font-weight:800;font-size:1rem;cursor:pointer}.checkout:disabled{opacity:.55}.error{color:var(--danger);font-size:.86rem}.empty{text-align:center;padding:50px 10px;color:var(--muted)}.hidden{display:none}.steps{display:flex;gap:7px;margin-bottom:18px}.steps span{flex:1;padding:7px;text-align:center;border-radius:8px;background:#edf2ee;color:var(--muted);font-size:.75rem;font-weight:800}.steps span.active{background:var(--g);color:#fff}.review{background:#f7faf8;border:1px solid var(--line);padding:13px;border-radius:10px;margin-bottom:13px;font-size:.88rem}.back{width:100%;border:0;background:none;color:var(--g);font-weight:700;margin-top:10px;cursor:pointer}@media(max-width:800px){.layout{grid-template-columns:1fr}.item{grid-template-columns:55px 1fr}.item img{width:55px;height:55px}.item>div:last-child{grid-column:2}}
</style></head><body><header><a href="index.html"><img src="img/logo-white.png" alt="Jay fooDs"></a><a href="index.html#menu">← Continue shopping</a></header><main class="wrap"><h1>Your cart</h1><div class="layout"><section class="panel" id="items"><p class="empty">Loading cart…</p></section><aside class="panel"><h2>Secure checkout</h2><div class="steps"><span class="active" id="step1-label">1. Delivery</span><span id="step2-label">2. Review &amp; pay</span></div><form id="form"><div id="delivery-step"><div class="field"><label>Full name *</label><input name="name" required autocomplete="name"></div><div class="field"><label>Phone *</label><input name="phone" required autocomplete="tel"></div><div class="field"><label>Email *</label><input name="email" required type="email" autocomplete="email"></div><div class="field"><label>Delivery address *</label><textarea name="address" required rows="2"></textarea></div><div class="field"><label>Delivery zone *</label><select name="delivery_zone_id" id="delivery-zone" required></select></div><div class="field"><label>Notes</label><textarea name="notes" rows="2"></textarea></div><button class="continue" id="continue" type="button">Continue to review</button></div><div id="review-step" class="hidden"><div class="review" id="review-details"></div><p>Payment will open securely through Paystack. Your order is confirmed only after successful server verification.</p><button class="checkout" id="checkout">Authorize &amp; pay with Paystack</button><button class="back" id="back" type="button">← Change delivery information</button></div><div class="meta" style="display:grid;gap:5px;margin-top:16px"><span style="display:flex;justify-content:space-between"><span>Products</span><b id="subtotal">GH₵0.00</b></span><span style="display:flex;justify-content:space-between"><span>Delivery</span><b id="delivery-fee">GH₵0.00</b></span></div><div class="total"><span>Grand total</span><span id="total">GH₵0.00</span></div><p class="error" id="error"></p></form></aside></div></main><script src="js/api.js"></script><script>
(()=>{'use strict';let products=[],cart=[],zones=[];const items=document.getElementById('items'),totalEl=document.getElementById('total'),subtotalEl=document.getElementById('subtotal'),deliveryEl=document.getElementById('delivery-fee'),zoneSelect=document.getElementById('delivery-zone'),checkout=document.getElementById('checkout'),money=p=>'GH₵'+(p/100).toLocaleString('en-GH',{minimumFractionDigits:2,maximumFractionDigits:2}),esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function hydrate(){cart=JSON.parse(localStorage.getItem('jf_cart')||'[]').map(i=>{const p=products.find(p=>p.id===i.product_id),s=p&&(p.sizes||[]).find(s=>s.id===i.size_id);return{...i,product:p,size:s}}).filter(i=>i.product&&i.size);save();render()}
function price(i){return i.mode==='bulk'&&i.product.bulk_available&&i.size.bulk_price_pesewas&&i.quantity>=i.size.bulk_min_quantity?i.size.bulk_price_pesewas:i.size.unit_price_pesewas}function save(){localStorage.setItem('jf_cart',JSON.stringify(cart.map(i=>({key:i.key,product_id:i.product_id,size_id:i.size_id,mode:i.mode,quantity:i.quantity,product_name:i.product.name,size_label:i.size.label,image_url:i.product.image_url,unit_price_pesewas:price(i)}))))}
function totals(){const subtotal=cart.reduce((n,i)=>n+price(i)*i.quantity,0),zone=zones.find(z=>z.id===+zoneSelect.value),delivery=zone?zone.fee_pesewas:0;return{subtotal,delivery,total:subtotal+delivery,zone}}function render(){if(!cart.length){items.innerHTML='<div class="empty"><h2>Your cart is empty</h2><a href="index.html#menu">Browse products</a></div>';subtotalEl.textContent=deliveryEl.textContent=totalEl.textContent=money(0);checkout.disabled=true;return}items.innerHTML=cart.map((i,n)=>`<div class="item"><div>${i.product.image_url?`<img src="${esc(i.product.image_url)}" alt="">`:''}</div><div><h3>${esc(i.product.name)}</h3><div class="meta">${esc(i.size.label)} · ${i.mode==='bulk'?'Bulk':'Single'} · ${money(price(i))} each</div></div><div><div class="qty"><button data-change="${n}" data-by="-1">−</button><b>${i.quantity}</b><button data-change="${n}" data-by="1">+</button></div><button class="remove" data-remove="${n}">Remove</button></div></div>`).join('');const t=totals();subtotalEl.textContent=money(t.subtotal);deliveryEl.textContent=money(t.delivery);totalEl.textContent=money(t.total);checkout.disabled=!t.zone}
items.addEventListener('click',e=>{let b=e.target.closest('[data-change]');if(b){let i=cart[+b.dataset.change];i.quantity=Math.max(1,i.quantity+(+b.dataset.by));save();render();return}b=e.target.closest('[data-remove]');if(b){cart.splice(+b.dataset.remove,1);save();render()}});
zoneSelect.addEventListener('change',render);document.getElementById('continue').addEventListener('click',()=>{const form=document.getElementById('form');if(!form.reportValidity())return;const f=new FormData(form),t=totals();document.getElementById('review-details').innerHTML=`<b>Deliver to:</b> ${esc(f.get('name'))}<br>${esc(f.get('phone'))} · ${esc(f.get('email'))}<br>${esc(f.get('address'))}, ${esc(t.zone.name)}<br><br>Products: ${money(t.subtotal)}<br>Delivery: ${money(t.delivery)}<br><b>Grand total: ${money(t.total)}</b><br><br><b>${cart.reduce((n,i)=>n+i.quantity,0)} bottles ready for payment</b>`;document.getElementById('delivery-step').classList.add('hidden');document.getElementById('review-step').classList.remove('hidden');document.getElementById('step1-label').classList.remove('active');document.getElementById('step2-label').classList.add('active')});document.getElementById('back').addEventListener('click',()=>{document.getElementById('review-step').classList.add('hidden');document.getElementById('delivery-step').classList.remove('hidden');document.getElementById('step2-label').classList.remove('active');document.getElementById('step1-label').classList.add('active')});
document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const f=new FormData(e.target),error=document.getElementById('error');error.textContent='';checkout.disabled=true;checkout.textContent='Securing checkout…';try{const groups=[...new Set(cart.map(i=>i.mode))];if(groups.length>1)throw new Error('Please checkout single and bulk items separately.');const order=await api.createOrder({order_type:groups[0]||'single',customer_name:f.get('name').trim(),customer_phone:f.get('phone').trim(),customer_email:f.get('email').trim(),delivery_address:f.get('address').trim(),delivery_zone_id:+f.get('delivery_zone_id'),notes:f.get('notes').trim(),items:cart.map(i=>({product_id:i.product_id,size_id:i.size_id,quantity:i.quantity}))});const pay=await api.startPayment(order.data.reference);localStorage.removeItem('jf_cart');location.assign(pay.data.authorization_url)}catch(err){error.textContent=err.message;checkout.disabled=false;checkout.textContent='Authorize & pay with Paystack'}});
Promise.all([api.getProducts(),api.getDeliveryZones()]).then(([p,z])=>{products=p.data||[];zones=z.data||[];zoneSelect.innerHTML=zones.length?zones.map(x=>`<option value="${x.id}">${esc(x.name)} — ${money(x.fee_pesewas)}</option>`).join(''):'<option value="">No delivery zones available</option>';hydrate()}).catch(()=>items.innerHTML='<p class="error">Could not load your cart. Please refresh.</p>');})();
</script><script>
(()=>{const notes=document.querySelector('[name="notes"]').closest('.field');notes.insertAdjacentHTML('afterend','<div class="field"><label>Promotional code</label><input name="promo_code" placeholder="Optional"></div>');const create=api.createOrder;api.createOrder=order=>{order.promo_code=document.querySelector('[name="promo_code"]').value.trim();return create(order)};api.getSiteContent().then(({data:c})=>{if(String(c.store_accepting_orders)!=='1'){document.getElementById('checkout').disabled=true;document.getElementById('error').textContent=c.store_closed_message||'Online ordering is temporarily paused.'}}).catch(()=>{});})();
</script></body></html>
